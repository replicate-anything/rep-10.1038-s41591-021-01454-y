steps:
- id: tab_2
  type: table
  label: Table 2
  description: Vaccination beliefs and coverage for the countries studied
  engine: r
  data:
  - data/table_wgm.csv
  - data/vacc_cov.csv
  inputs:
  - data/table_wgm.csv
  - data/vacc_cov.csv
  code: code/tab_2.R
  outputs:
  - outputs/tab_2.html

- id: fig_1
  type: figure
  label: Fig. 1
  description: Acceptance rates, overall and by respondent characteristics
  engine: r
  data: data/fig_1.csv
  inputs:
  - data/fig_1.csv
  code: code/fig_1.R
  outputs:
  - outputs/fig_1.png

- id: fig_2
  type: figure
  label: Fig. 2
  description: Reasons not to take the vaccine
  engine: r
  data: data/fig_3.csv
  inputs:
  - data/fig_3.csv
  code: code/fig_2.R
  outputs:
  - outputs/fig_2.png

- id: fig_3
  type: figure
  label: Fig. 3
  description: Trusted sources respondents say they would trust most to help them decide whether to take the COVID-19 vaccine
  engine: r
  data: data/combined.csv
  inputs:
  - data/combined.csv
  code: code/fig_3.R
  outputs:
  - outputs/fig_3.png

- id: ext_fig_1
  type: figure
  label: Extended Data Fig. 1
  description: Trusted sources and institutions, broken down by gender
  engine: r
  data: data/combined.csv
  inputs:
  - data/combined.csv
  code: code/ext_fig_1.R
  outputs:
  - outputs/ext_fig_1.png

- id: ext_fig_2
  type: figure
  label: Extended Data Fig. 2
  description: Average vaccine acceptance across all LMIC countries leaving one or two study samples out
  engine: r
  data:
  - data/fig_2_hist.csv
  - data/fig_2_ref.csv
  inputs:
  - data/fig_2_hist.csv
  - data/fig_2_ref.csv
  code: code/ext_fig_2.R
  outputs:
  - outputs/ext_fig_2.png
